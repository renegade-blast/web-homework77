{% extends "base.html" %}

{% block title %}用户管理系统 - Ping 测试{% endblock %}

{% block content %}
    <div class="card">
        <h2>Ping 网络诊断</h2>
        <form method="post" action="/ping" class="search-form">
            <div class="search-box">
                <input type="text" name="ip" class="form-input search-input" placeholder="输入 IP 地址或域名（如 8.8.8.8）" required>
                <button type="submit" class="btn btn-search">Ping</button>
            </div>
        </form>

        {% if ping_error %}
            <div class="error-message">{{ ping_error }}</div>
        {% endif %}

        {% if ping_result %}
            <div class="ping-output">
                <div class="ping-header">执行结果</div>
                <pre class="ping-console">{{ ping_result }}</pre>
            </div>
        {% endif %}
    </div>
{% endblock %}
