{% extends "base.html" %}

{% block title %}用户管理系统 - 上传头像{% endblock %}

{% block content %}
    <div class="card upload-card">
        <h2>上传头像</h2>

        {% if error %}
            <div class="error-message">{{ error }}</div>
        {% endif %}

        {% if warning %}
            <div class="warning-message">{{ warning }}</div>
        {% endif %}

        {% if success %}
            <div class="success-message">上传成功！</div>
            <div class="upload-preview">
                <h3>头像预览</h3>
                <img src="{{ file_url }}" alt="头像预览" class="preview-img">
                <p class="file-link">
                    文件路径：<a href="{{ file_url }}" target="_blank">{{ file_url }}</a>
                </p>
            </div>
            <div class="action-bar">
                <a href="/upload" class="btn btn-primary">继续上传</a>
                <a href="/" class="btn btn-secondary" style="background:#667eea;">返回首页</a>
            </div>
        {% else %}
            <form method="post" action="/upload" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                <div class="form-group">
                    <label for="file">选择头像文件</label>
                    <input type="file" id="file" name="file" class="form-input file-input" required>
                </div>
                <button type="submit" class="btn btn-primary">上 传</button>
            </form>
        {% endif %}
    </div>
{% endblock %}
